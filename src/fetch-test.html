<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fetch Test</title>
    <style>
        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h2 { color: #7eb8f7; }
        #status {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .success { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
        .error   { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
        .info    { background: #1a2a3a; color: #7eb8f7; border: 1px solid #7eb8f7; }
        #output {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 1rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 500px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h2>Fetch Test</h2>
    <div id="status" class="info">Attempting fetch...</div>
    <div id="output"></div>

    <script>
        async function runTest() {
            const status = document.getElementById('status');
            const output = document.getElementById('output');

            try {
                const response = await fetch('./index.html');

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const text = await response.text();
                const protocol = window.location.protocol;

                status.className = 'success';
                status.textContent = `✓ Fetch succeeded via ${protocol} — ${text.length} bytes retrieved`;
                output.textContent = text;

            } catch (e) {
                const protocol = window.location.protocol;
                status.className = 'error';
                status.textContent = `✗ Fetch failed via ${protocol} — ${e.message}`;
                output.textContent = 'This is expected when running locally via file:// protocol.\nFetch works when served from a web server (http:// or https://).';
            }
        }

        runTest();
    </script>
</body>
</html>
